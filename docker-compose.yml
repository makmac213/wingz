# ---------------------------------------------------------------------------
# Wingz Ride Management API — demo stack (web + PostgreSQL)
# ---------------------------------------------------------------------------
services:
  web:
    build: .
    image: wingz-demo
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # The list endpoint requires auth. An unauthenticated request returning
      # HTTP 401 proves both that the server is up and that auth is enforced.
      test:
        [
          "CMD-SHELL",
          "test \"$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/api/v1/rides/)\" = \"401\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wingz
      POSTGRES_USER: wingz
      POSTGRES_PASSWORD: wingz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wingz -d wingz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
